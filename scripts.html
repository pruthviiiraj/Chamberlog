<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Scripts — Chamber Logs</title>
  <meta name="description" content="Spoken-word scripts and essays for voice from Chamber Logs. Each links to the YouTube video it was written for." />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

  <header>
    <div class="header-top">
      <a href="/" class="site-name">⬡ Chamber Logs</a>
      <button class="hamburger" id="menu-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
    </div>
    <nav class="header-nav" id="main-nav">
      <a href="/">Home</a>
      <div class="nav-blog">
        <button class="nav-blog-toggle" id="blog-toggle" aria-expanded="false" aria-haspopup="true">Blog <span class="nav-chevron">›</span></button>
        <div class="nav-submenu" id="blog-submenu">
          <a href="/categories/health.html">Health</a>
          <a href="/categories/fitness.html">Fitness</a>
          <a href="/categories/mind.html">Mind</a>
          <a href="/categories/philosophy.html">Philosophy</a>
        </div>
      </div>
      <a href="/scripts.html" class="active">Scripts</a>
      <a href="/about.html">About</a>
      <span class="nav-placeholder">Ebooks</span>
    </nav>
  </header>

  <main>
    <section class="intro">
      <p>Scripts — spoken essays. Each links to the YouTube video it was written for.</p>
    </section>
    <section class="posts">
      <p class="empty">No scripts published yet.</p>
    </section>
  </main>

  <footer>
    <div class="email-capture">
      <p class="email-label">Get new posts by email</p>
      <form action="YOUR_BUTTONDOWN_URL" method="post" target="popupwindow" class="email-form">
        <input type="email" name="email" placeholder="your@email.com" class="email-input" required />
        <button type="submit" class="email-submit">Subscribe</button>
      </form>
    </div>
    <p>Chamber Logs &mdash; chamberlog.in</p>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('menu-toggle');
      var nav = document.getElementById('main-nav');
      var blogBtn = document.getElementById('blog-toggle');
      var blogMenu = document.getElementById('blog-submenu');

      function closeMenu() {
        nav.classList.remove('open');
        btn.textContent = '☰';
        btn.setAttribute('aria-expanded', 'false');
        if (blogBtn && blogMenu) {
          blogMenu.classList.remove('open');
          blogBtn.setAttribute('aria-expanded', 'false');
        }
      }

      btn.addEventListener('click', function () {
        if (nav.classList.contains('open')) {
          closeMenu();
        } else {
          nav.classList.add('open');
          btn.textContent = '✕';
          btn.setAttribute('aria-expanded', 'true');
        }
      });

      nav.addEventListener('click', function (e) {
        if (e.target === nav) closeMenu();
      });

      if (blogBtn && blogMenu) {
        blogBtn.addEventListener('click', function () {
          var open = blogMenu.classList.toggle('open');
          blogBtn.setAttribute('aria-expanded', String(open));
        });
        if (blogMenu.querySelector('a.active')) {
          blogMenu.classList.add('open');
          blogBtn.setAttribute('aria-expanded', 'true');
        }
      }
    })();
  </script>

</body>

</html>
